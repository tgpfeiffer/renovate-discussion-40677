name: Run Renovate on Release Branches

on:
  workflow_dispatch: {}

jobs:
  renovate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run Renovate
        uses: renovatebot/github-action@7b4b65bf31e07d4e3e51708d07700fb41bc03166 # v46.1.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          LOG_LEVEL: debug
          RENOVATE_PLATFORM: github
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          # merge the base branch config with the config from main branch
          # to allow iteration on the config file
          RENOVATE_USE_BASE_BRANCH_CONFIG: merge
          # only needed for initial development (when there is no config yet on the main branch)
          RENOVATE_BASE_BRANCH_PATTERNS: '["/^feature\\/.*/"]'
          RENOVATE_ONBOARDING: "false"
          RENOVATE_REQUIRE_CONFIG: "optional"
